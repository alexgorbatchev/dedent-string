name: Release npm Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Print OIDC claims
        run: |
          set -euo pipefail
          response=$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org")
          token=$(node -e 'process.stdout.write(JSON.parse(process.argv[1]).value)' "$response")
          node - <<'EOF' "$token"
          const token = process.argv[2];
          const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString('utf8'));
          console.log(JSON.stringify({
            aud: payload.aud,
            sub: payload.sub,
            repository: payload.repository,
            repository_owner: payload.repository_owner,
            ref: payload.ref,
            workflow_ref: payload.workflow_ref,
            job_workflow_ref: payload.job_workflow_ref,
            environment: payload.environment ?? null,
          }, null, 2));
          EOF

      - name: Derive release version from tag
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#v}"
          if [[ -z "$release_version" || "$release_version" == "$GITHUB_REF_NAME" ]]; then
            echo "Expected a tag like v1.2.3, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$release_version" >> "$GITHUB_ENV"

      - name: Sync package version from the release tag
        run: npm pkg set version="$RELEASE_VERSION"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Publish package
        run: npm publish --provenance --access public
